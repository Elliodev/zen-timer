<main class="h-screen w-full flex flex-col items-center justify-center bg-slate-950 text-slate-200 font-sans selection:bg-teal-500/30">

  <header class="absolute top-10 text-center">
    <h1 class="text-sm uppercase tracking-[0.4em] opacity-30 font-light">
      {{ title() }}
    </h1>
  </header>

  <div class="text-[12rem] font-mono font-extralight tracking-tighter leading-none mb-20 select-none">
    {{ displayTime() }}
  </div>

  <div class="flex gap-6 items-center">
    <button
      (click)="startTimer()"
      [class]="'px-12 py-4 rounded-full border transition-all duration-500 uppercase tracking-widest text-xs cursor-pointer ' +
               (timerIsStart ? 'border-amber-500/50 text-amber-500 hover:bg-amber-500/10' : 'border-teal-500/50 text-teal-500 hover:bg-teal-500/10')"
    >
      @if (timerIsStart) {
        Pause
      } @else {
        Focus
      }
    </button>

    <button
    (click)="resetTimer()"
      class="p-4 opacity-20 hover:opacity-100 transition-opacity cursor-pointer"
      title="Réinitialiser"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
  </div>

</main>
