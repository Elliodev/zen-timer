<main
  class="h-screen w-full flex flex-col items-center justify-center transition-colors duration-1000 p-4"
  [class.bg-slate-950]="!isBreak()"
  [class.bg-teal-950]="isBreak()"
>

  <div class="mb-6 md:mb-8 px-3 py-1 md:px-4 md:py-1 rounded-full border border-white/10 text-[10px] md:text-xs uppercase tracking-[0.2em] md:tracking-[0.3em] text-white/40 text-center">
    @if (isBreak()) { Pause Zen } @else { Travail Focus }
  </div>

  <div class="text-[22vw] sm:text-[18vw] md:text-[10rem] font-mono font-extralight text-white leading-none mb-4 select-none text-center">
    {{ displayTime() }}
  </div>

  <div class="w-[80%] max-w-xs md:w-80 h-1 md:h-1.5 bg-white/10 rounded-full mb-12 md:mb-16 overflow-hidden">
    <div
      class="h-full bg-white transition-all duration-1000 ease-linear"
      [style.width.%]="progress()"
    ></div>
  </div>

  <div class="flex flex-wrap justify-center gap-6 md:gap-4">
    <button
      (click)="startTimer()"
      class="w-full sm:w-auto px-10 py-4 md:py-3 rounded-xl bg-white text-slate-950 font-bold uppercase tracking-widest text-xs hover:scale-105 active:scale-95 transition-transform cursor-pointer"
    >
      {{ timerIsStart ? 'Pause' : 'Démarrer' }}
    </button>

    <div class="flex gap-4">
      <button
        (click)="switchMode()"
        class="p-4 md:p-3 rounded-xl border border-white/20 text-white hover:bg-white/5 active:bg-white/10 transition-colors cursor-pointer"
        title="Changer de mode"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 md:w-5 md:h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="m21 8-4-4-4 4"/><path d="M17 4v16"/></svg>
      </button>

      <button
        (click)="resetTimer()"
        class="p-4 md:p-3 rounded-xl border border-white/20 text-white hover:bg-white/5 active:bg-white/10 transition-colors cursor-pointer"
        title="Réinitialiser"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 md:w-5 md:h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
    </div>
  </div>

</main>
